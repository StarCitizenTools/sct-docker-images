name: 🐳 Build & Push Docker Image
run-name: 🌻➡️🐳 Build & Push MediaWiki Docker Image

on:
  push:
    branches:
      - 'smw'
  workflow_dispatch:
    inputs:
      update_composer_dependencies:
        description: 'Force a full refresh of Composer dependencies'
        required: true
        type: boolean
        default: false
      update_system_dependencies:
        description: 'Force a refresh of apt system packages'
        required: true
        type: boolean
        default: false
      update_php_extensions:
        description: 'Force a refresh of PHP extensions'
        required: true
        type: boolean
        default: false

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - 
        name: 🔒 Set Calver Version
        uses: Nelyx/action-calver@v1.0.0
        id: setcalver
        with:
          default_branch: 'refs/heads/smw'
          format: 'YY.MM.DD'
      -
        name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: 🏗️ Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: starcitizentools/mediawiki:smw-latest,starcitizentools/mediawiki:smw-${{ steps.setcalver.outputs.package_version }}
          build-args: |
            UPDATE_COMPOSER_DEPENDENCIES=${{ github.event.inputs.update_composer_dependencies }}
            UPDATE_SYSTEM_DEPENDENCIES=${{ github.event.inputs.update_system_dependencies }}
            UPDATE_PHP_EXTENSIONS=${{ github.event.inputs.update_php_extensions }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
